services:
  db:
    image: postgres:16
    container_name: novobanco-db
    restart: always
    environment:
      POSTGRES_DB: novobanco
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - novobanco_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: docker/api.dockerfile
    container_name: novobanco-api
    restart: always
    ports:
      - "5000:80"
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=novobanco;Username=postgres;Password=postgres

volumes:
  novobanco_pgdata:
